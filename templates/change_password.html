{% extends "base.html" %}
{% block title %}Alterar Senha — Sistema de Controle{% endblock %}
{% block content %}

<style>
.change-container {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh;
}
</style>

<div class="change-container d-flex justify-content-center align-items-center">
  <div class="card shadow-lg" style="width: 400px;">
    <div class="card-header bg-dark text-white text-center">
      <i class="bi bi-shield-lock" style="font-size: 2rem;"></i>
      <h4 class="mt-2 mb-0">Alterar Senha</h4>
    </div>
    <div class="card-body p-4">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">
            <i class="bi bi-lock me-2"></i>Senha Atual
          </label>
          <div class="input-group">
            <span class="input-group-text bg-light">
              <i class="bi bi-lock-fill"></i>
            </span>
            <input type="password" name="current_password" class="form-control" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">
            <i class="bi bi-key me-2"></i>Nova Senha
          </label>
          <div class="input-group">
            <span class="input-group-text bg-light">
              <i class="bi bi-key-fill"></i>
            </span>
            <input type="password" name="new_password" class="form-control" required>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">
            <i class="bi bi-check2-circle me-2"></i>Confirmar Nova Senha
          </label>
          <div class="input-group">
            <span class="input-group-text bg-light">
              <i class="bi bi-check2-all"></i>
            </span>
            <input type="password" name="confirm_password" class="form-control" required>
          </div>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-dark btn-lg">
            <i class="bi bi-check2-circle me-2"></i>Atualizar Senha
          </button>
        </div>

        <div class="text-center mt-3">
          <a href="{{ url_for('main.dashboard') }}" class="text-muted text-decoration-none">
            <i class="bi bi-arrow-left me-1"></i>Voltar ao Dashboard
          </a>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
